name: News-to-gram Reel Generator

on:
  schedule:
    # Runs at 08:00 UTC every day
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy gtts requests pillow python-dotenv

      - name: Generate News Reel
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python main.py # Replace main.py with your filename

      - name: Commit and Push Reel
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news_reel.mp4
          git commit -m "Auto-generated News Reel: $(date +'%Y-%m-%d')"
          git push