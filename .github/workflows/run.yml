name: Sikar News Automation

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  workflow_dispatch:      # Manual run button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install aiohttp beautifulsoup4 python-telegram-bot

      - name: Execute Scraper
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CH_ID: ${{ secrets.CH_ID }}
        run: python main.py

      - name: Sync History Back to GitHub
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "SikarBot-Automator"
          git add posted_sikar_news.txt
          # Commit only if changes exist to avoid workflow errors
          git commit -m "Auto-update history log [skip ci]" || exit 0
          git push
